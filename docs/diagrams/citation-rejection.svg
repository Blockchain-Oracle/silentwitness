<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Citation gate rejection flow</title>
  <desc id="desc">A six-step flow showing a hallucinated path being rejected because the cited span and the observation text do not match.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b05d2b"/>
    </marker>
    <style>
      .bg { fill: #fbfaf7; stroke: #ddd7c8; stroke-width: 2; rx: 26; }
      .step { fill: #fff; stroke: #dad5c8; stroke-width: 2; rx: 22; }
      .step-rust { fill: #f7eee7; stroke: #d8b59c; stroke-width: 2; rx: 22; }
      .step-green { fill: #e8f4ec; stroke: #9cc7ad; stroke-width: 2; rx: 22; }
      .title { fill: #131718; font: 700 40px Inter, ui-sans-serif, system-ui, sans-serif; }
      .eyebrow { fill: #b05d2b; font: 700 17px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }
      .body { fill: #4b5563; font: 500 19px Inter, ui-sans-serif, system-ui, sans-serif; }
      .card-title { fill: #131718; font: 700 24px Inter, ui-sans-serif, system-ui, sans-serif; }
      .num { fill: #b05d2b; font: 700 28px Inter, ui-sans-serif, system-ui, sans-serif; }
      .line { stroke: #b05d2b; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="24" y="24" width="1552" height="772" class="bg"/>
  <text x="74" y="88" class="eyebrow">Interaction 8.4</text>
  <text x="74" y="134" class="title">What happens when the claim goes past the evidence</text>
  <text x="74" y="170" class="body">This is the demo beat judges care about: the model says more than the record proves, and the server refuses it.</text>

  <rect x="82" y="272" width="250" height="156" class="step"/>
  <text x="110" y="324" class="num">01</text>
  <text x="110" y="360" class="card-title">Stage the observation</text>
  <text x="110" y="392" class="body">The model submits a claim and a cited span.</text>

  <rect x="384" y="272" width="250" height="156" class="step"/>
  <text x="412" y="324" class="num">02</text>
  <text x="412" y="360" class="card-title">Reload the stored blob</text>
  <text x="412" y="392" class="body">The server pulls the saved tool output and verifies the hash.</text>

  <rect x="686" y="272" width="250" height="156" class="step"/>
  <text x="714" y="324" class="num">03</text>
  <text x="714" y="360" class="card-title">Check the cited span</text>
  <text x="714" y="392" class="body">The quoted lines exist, so citation alone is not enough to pass.</text>

  <rect x="988" y="272" width="250" height="156" class="step-rust"/>
  <text x="1016" y="324" class="num">04</text>
  <text x="1016" y="360" class="card-title">Reject the hallucinated entity</text>
  <text x="1016" y="392" class="body">The path in the observation does not appear in the cited record.</text>

  <rect x="1290" y="272" width="230" height="156" class="step"/>
  <text x="1318" y="324" class="num">05</text>
  <text x="1318" y="360" class="card-title">Return a concrete error</text>
  <text x="1318" y="392" class="body">The server names the bad entity and suggests the verbatim fix.</text>

  <rect x="600" y="534" width="400" height="172" class="step-green"/>
  <text x="628" y="588" class="num">06</text>
  <text x="628" y="626" class="card-title">Retry with the exact path</text>
  <text x="628" y="660" class="body">The investigator reuses the same evidence, switches to the real path, and the observation is accepted.</text>

  <line x1="332" y1="350" x2="384" y2="350" class="line"/>
  <line x1="634" y1="350" x2="686" y2="350" class="line"/>
  <line x1="936" y1="350" x2="988" y2="350" class="line"/>
  <line x1="1238" y1="350" x2="1290" y2="350" class="line"/>
  <path d="M 1414 428 C 1430 506, 1130 552, 1000 574" class="line"/>
</svg>
