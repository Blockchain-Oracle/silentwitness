<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 960" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Investigator to evidence flow</title>
  <desc id="desc">A six-step flow showing the investigator forming a hypothesis, calling a specialist through the MCP server, passing through gates, staging an observation, and updating the report.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4256d0"/>
    </marker>
    <style>
      .bg { fill: #fbfaf7; stroke: #ddd7c8; stroke-width: 2; rx: 26; }
      .step { fill: #fff; stroke: #dad5c8; stroke-width: 2; rx: 22; }
      .step-blue { fill: #eef1ff; stroke: #b8c0f4; stroke-width: 2; rx: 22; }
      .step-green { fill: #e8f4ec; stroke: #9cc7ad; stroke-width: 2; rx: 22; }
      .title { fill: #131718; font: 700 40px Inter, ui-sans-serif, system-ui, sans-serif; }
      .eyebrow { fill: #2e7d5b; font: 700 17px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }
      .body { fill: #4b5563; font: 500 19px Inter, ui-sans-serif, system-ui, sans-serif; }
      .card-title { fill: #131718; font: 700 24px Inter, ui-sans-serif, system-ui, sans-serif; }
      .num { fill: #4256d0; font: 700 28px Inter, ui-sans-serif, system-ui, sans-serif; }
      .line { stroke: #4256d0; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="24" y="24" width="1552" height="912" class="bg"/>
  <text x="74" y="88" class="eyebrow">Interaction 8.1</text>
  <text x="74" y="134" class="title">Investigator to tool result to cited finding</text>
  <text x="74" y="170" class="body">This is the normal path when SilentWitness turns a live hypothesis into a reportable finding.</text>

  <rect x="78" y="246" width="316" height="156" class="step-blue"/>
  <text x="108" y="296" class="num">01</text>
  <text x="108" y="334" class="card-title">Form the hypothesis</text>
  <text x="108" y="368" class="body">The investigator starts with one concrete question and assigns it to the right specialist.</text>

  <rect x="452" y="246" width="316" height="156" class="step"/>
  <text x="482" y="296" class="num">02</text>
  <text x="482" y="334" class="card-title">Run one typed MCP tool</text>
  <text x="482" y="368" class="body">The specialist reaches the MCP server, not the raw disk or memory image.</text>

  <rect x="826" y="246" width="316" height="156" class="step-green"/>
  <text x="856" y="296" class="num">03</text>
  <text x="856" y="334" class="card-title">Sanitize, normalize, audit</text>
  <text x="856" y="368" class="body">Tool output is cleaned, hashed, and recorded before the model can cite it.</text>

  <rect x="1200" y="246" width="316" height="156" class="step"/>
  <text x="1230" y="296" class="num">04</text>
  <text x="1230" y="334" class="card-title">Stage the observation</text>
  <text x="1230" y="368" class="body">Citation and entity gates verify the claim against the stored record.</text>

  <rect x="266" y="526" width="430" height="170" class="step"/>
  <text x="296" y="578" class="num">05</text>
  <text x="296" y="616" class="card-title">Interpret and write</text>
  <text x="296" y="650" class="body">The investigator records the interpretation, updates the report, and keeps the audit chain intact.</text>

  <rect x="888" y="526" width="430" height="170" class="step-green"/>
  <text x="918" y="578" class="num">06</text>
  <text x="918" y="616" class="card-title">Confirm or pivot</text>
  <text x="918" y="650" class="body">The hypothesis becomes confirmed, pivots to a new lead, or dies and lands in the gaps section.</text>

  <line x1="394" y1="324" x2="452" y2="324" class="line"/>
  <line x1="768" y1="324" x2="826" y2="324" class="line"/>
  <line x1="1142" y1="324" x2="1200" y2="324" class="line"/>
  <path d="M 1358 404 C 1430 470, 1356 510, 1318 526" class="line"/>
  <line x1="888" y1="611" x2="696" y2="611" class="line"/>
</svg>
