<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">SilentWitness system architecture</title>
  <desc id="desc">A branded architecture diagram showing read-only evidence feeding an offline ingest spine, then a custom MCP server, investigator agent, audit trail, and report output.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4256d0"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d5b"/>
    </marker>
    <style>
      .bg { fill: #fbfaf7; }
      .panel { fill: #ffffff; stroke: #dad5c8; stroke-width: 2; rx: 24; }
      .panel-soft { fill: #f5f1e4; stroke: #dad5c8; stroke-width: 2; rx: 24; }
      .title { fill: #131718; font: 700 46px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { fill: #4b5563; font: 500 20px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .eyebrow { fill: #2e7d5b; font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }
      .card-title { fill: #131718; font: 700 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .card-copy { fill: #4b5563; font: 500 18px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .pill { fill: #e8f4ec; stroke: #9cc7ad; stroke-width: 1.5; rx: 999; }
      .pill-blue { fill: #eef1ff; stroke: #b8c0f4; stroke-width: 1.5; rx: 999; }
      .pill-text { fill: #2e7d5b; font: 700 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .pill-text-blue { fill: #4256d0; font: 700 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { stroke: #4256d0; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .line-soft { stroke: #2e7d5b; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow-soft); }
      .line-dashed { stroke: #8f98b6; stroke-width: 3; stroke-dasharray: 10 10; stroke-linecap: round; }
      .step { fill: #131718; font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <rect x="28" y="28" width="1544" height="924" rx="28" fill="#fcfbf7" stroke="#ddd7c8" stroke-width="2"/>

  <text x="84" y="112" class="eyebrow">Custom MCP Server submission</text>
  <text x="84" y="162" class="title">SilentWitness system architecture</text>
  <text x="84" y="205" class="body">Raw evidence is parsed offline once. The model never gets a generic shell or raw-artifact reader.</text>
  <text x="84" y="236" class="body">It only sees typed MCP tools over indexed records, then every claim is checked before it lands in the report.</text>

  <g transform="translate(1456 52)">
    <mask id="sw-cut-architecture">
      <rect width="24" height="24" fill="#fff"/>
      <rect x="8.5" y="8.6" width="5" height="6.8" rx="2.5" fill="#000"/>
    </mask>
    <rect x="2.6" y="6.6" width="11.6" height="10.8" rx="4.3" stroke="#131718" stroke-width="2.3" mask="url(#sw-cut-architecture)"/>
    <rect x="9.8" y="6.6" width="11.6" height="10.8" rx="4.3" stroke="#2e7d5b" stroke-width="2.3"/>
  </g>
  <text x="1490" y="72" text-anchor="end" class="pill-text-blue">SilentWitness</text>

  <rect x="76" y="300" width="252" height="266" class="panel-soft"/>
  <rect x="372" y="300" width="288" height="266" class="panel"/>
  <rect x="704" y="300" width="336" height="266" class="panel"/>
  <rect x="1084" y="300" width="248" height="266" class="panel"/>
  <rect x="1376" y="300" width="148" height="266" class="panel-soft"/>

  <rect x="96" y="324" width="142" height="30" class="pill"/>
  <text x="167" y="345" text-anchor="middle" class="pill-text">Read-only source</text>
  <text x="96" y="396" class="card-title">Evidence</text>
  <text x="96" y="434" class="card-copy">Disk image, memory capture, and case metadata stay outside the agent loop.</text>
  <text x="96" y="482" class="card-copy">Mount rules and registration checks keep the source side read-only.</text>

  <rect x="392" y="324" width="144" height="30" class="pill"/>
  <text x="464" y="345" text-anchor="middle" class="pill-text">Offline ingest</text>
  <text x="392" y="396" class="card-title">Prepare + index</text>
  <text x="392" y="434" class="card-copy">Targeted parsers extract EVTX, MFT, registry, SRUM, prefetch, LNK, jump lists, USN, and transcripts.</text>
  <text x="392" y="496" class="card-copy">Every row in the case index carries provenance, audit ID, and content hash.</text>

  <rect x="724" y="324" width="186" height="30" class="pill-blue"/>
  <text x="817" y="345" text-anchor="middle" class="pill-text-blue">Custom FastMCP server</text>
  <text x="724" y="396" class="card-title">Tool firewall + gates</text>
  <text x="724" y="434" class="card-copy">The agent can search evidence, inspect records, stage findings, and verify claims.</text>
  <text x="724" y="482" class="card-copy">Citation gate, entity gate, sanitizer, and audit logging sit at the server boundary.</text>

  <rect x="1104" y="324" width="174" height="30" class="pill"/>
  <text x="1191" y="345" text-anchor="middle" class="pill-text">Reference agent</text>
  <text x="1104" y="396" class="card-title">Investigator loop</text>
  <text x="1104" y="434" class="card-copy">Hypotheses form, pivot, confirm, or die. The critic and coverage gate push breadth before final output.</text>
  <text x="1104" y="496" class="card-copy">No direct write path reaches the evidence source.</text>

  <rect x="1396" y="324" width="102" height="30" class="pill-blue"/>
  <text x="1447" y="345" text-anchor="middle" class="pill-text-blue">Outputs</text>
  <text x="1396" y="396" class="card-title">Report</text>
  <text x="1396" y="434" class="card-copy">Findings, audit chain, and approval ledger.</text>

  <line x1="328" y1="432" x2="372" y2="432" class="line-soft"/>
  <line x1="660" y1="432" x2="704" y2="432" class="line"/>
  <line x1="1040" y1="432" x2="1084" y2="432" class="line"/>
  <line x1="1332" y1="432" x2="1376" y2="432" class="line-soft"/>

  <rect x="724" y="612" width="370" height="126" class="panel"/>
  <text x="748" y="656" class="card-title">Three load-bearing checks</text>
  <text x="748" y="694" class="card-copy">1. No raw-evidence shell surface</text>
  <text x="748" y="724" class="card-copy">2. Citation and entity verification before observation staging</text>
  <text x="748" y="754" class="card-copy">3. Hash-chained audit trail and approval ledger after write</text>

  <rect x="1104" y="612" width="300" height="126" class="panel-soft"/>
  <text x="1128" y="656" class="card-title">Supplementary layer</text>
  <text x="1128" y="694" class="card-copy">Model provider choice, investigator prompt, and critic prompt shape quality.</text>
  <text x="1128" y="724" class="card-copy">They do not replace the server-side checks above.</text>

  <line x1="1192" y1="566" x2="1192" y2="612" class="line"/>
  <line x1="1008" y1="675" x2="1104" y2="675" class="line-dashed"/>

  <rect x="1376" y="612" width="148" height="126" class="panel"/>
  <text x="1400" y="656" class="card-title">Judge read</text>
  <text x="1400" y="694" class="card-copy">Trace the claim, audit row, and source artifact.</text>

  <text x="76" y="850" class="step">01</text>
  <text x="116" y="850" class="body">Evidence enters once, gets parsed once, and stays outside the model.</text>
  <text x="76" y="888" class="step">02</text>
  <text x="116" y="888" class="body">The MCP server becomes the only discovery and write surface the agent can touch.</text>
  <text x="76" y="926" class="step">03</text>
  <text x="116" y="926" class="body">Everything the judge sees is downstream of those architectural checks.</text>
</svg>
