<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 760" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Finding approval ledger flow</title>
  <desc id="desc">A five-step flow showing the examiner approving a finding, deriving an HMAC key, appending the ledger entry, and rerendering the report.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d5b"/>
    </marker>
    <style>
      .bg { fill: #fbfaf7; stroke: #ddd7c8; stroke-width: 2; rx: 26; }
      .step { fill: #fff; stroke: #dad5c8; stroke-width: 2; rx: 22; }
      .step-green { fill: #e8f4ec; stroke: #9cc7ad; stroke-width: 2; rx: 22; }
      .title { fill: #131718; font: 700 40px Inter, ui-sans-serif, system-ui, sans-serif; }
      .eyebrow { fill: #2e7d5b; font: 700 17px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }
      .body { fill: #4b5563; font: 500 19px Inter, ui-sans-serif, system-ui, sans-serif; }
      .card-title { fill: #131718; font: 700 24px Inter, ui-sans-serif, system-ui, sans-serif; }
      .num { fill: #2e7d5b; font: 700 28px Inter, ui-sans-serif, system-ui, sans-serif; }
      .line { stroke: #2e7d5b; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="24" y="24" width="1552" height="712" class="bg"/>
  <text x="74" y="88" class="eyebrow">Interaction 8.2</text>
  <text x="74" y="134" class="title">Examiner approval and HMAC sealing</text>
  <text x="74" y="170" class="body">Approval is not a loose comment. It becomes a separate ledger event bound to the finding text.</text>

  <rect x="76" y="262" width="256" height="150" class="step"/>
  <text x="104" y="314" class="num">01</text>
  <text x="104" y="350" class="card-title">Select the finding</text>
  <text x="104" y="382" class="body">`silentwitness approve` loads the staged content and cited audit IDs.</text>

  <rect x="392" y="262" width="256" height="150" class="step"/>
  <text x="420" y="314" class="num">02</text>
  <text x="420" y="350" class="card-title">Prompt for the password</text>
  <text x="420" y="382" class="body">The examiner authorizes the decision with a local secret, not a prompt token.</text>

  <rect x="708" y="262" width="256" height="150" class="step-green"/>
  <text x="736" y="314" class="num">03</text>
  <text x="736" y="350" class="card-title">Derive the HMAC key</text>
  <text x="736" y="382" class="body">PBKDF2-SHA256 derives the signing key from the password and case salt.</text>

  <rect x="1024" y="262" width="256" height="150" class="step"/>
  <text x="1052" y="314" class="num">04</text>
  <text x="1052" y="350" class="card-title">Append the ledger row</text>
  <text x="1052" y="382" class="body">The approval ledger gets the finding ID, content hash, signer, and HMAC.</text>

  <rect x="1340" y="262" width="180" height="150" class="step-green"/>
  <text x="1368" y="314" class="num">05</text>
  <text x="1368" y="350" class="card-title">Rerender the report</text>
  <text x="1368" y="382" class="body">Approved state becomes visible downstream.</text>

  <line x1="332" y1="338" x2="392" y2="338" class="line"/>
  <line x1="648" y1="338" x2="708" y2="338" class="line"/>
  <line x1="964" y1="338" x2="1024" y2="338" class="line"/>
  <line x1="1280" y1="338" x2="1340" y2="338" class="line"/>
</svg>
