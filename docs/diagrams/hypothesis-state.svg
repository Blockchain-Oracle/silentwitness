<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">SilentWitness hypothesis state transitions</title>
  <desc id="desc">A state diagram showing ACTIVE transitioning to CONFIRMED, PIVOTED, or ABANDONED with dispatch staying within ACTIVE.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4256d0"/>
    </marker>
    <style>
      .bg { fill: #fbfaf7; stroke: #ddd7c8; stroke-width: 2; rx: 26; }
      .node { stroke-width: 2; rx: 24; }
      .node-active { fill: #eef1ff; stroke: #b8c0f4; }
      .node-green { fill: #e8f4ec; stroke: #9cc7ad; }
      .node-rust { fill: #f7eee7; stroke: #d8b59c; }
      .title { fill: #131718; font: 700 40px Inter, ui-sans-serif, system-ui, sans-serif; }
      .body { fill: #4b5563; font: 500 20px Inter, ui-sans-serif, system-ui, sans-serif; }
      .node-title { fill: #131718; font: 700 28px Inter, ui-sans-serif, system-ui, sans-serif; }
      .node-copy { fill: #4b5563; font: 500 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .eyebrow { fill: #2e7d5b; font: 700 17px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }
      .arrow { stroke: #4256d0; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .loop { stroke: #2e7d5b; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); fill: none; }
      .label { fill: #4256d0; font: 700 16px Inter, ui-sans-serif, system-ui, sans-serif; }
    </style>
  </defs>
  <rect x="24" y="24" width="1352" height="572" class="bg"/>
  <text x="74" y="88" class="eyebrow">Hypothesis lifecycle</text>
  <text x="74" y="134" class="title">How one investigative thread moves</text>
  <text x="74" y="170" class="body">SilentWitness only works one live hypothesis at a time. Breadth comes from repeated form, test, pivot, and confirm cycles.</text>

  <rect x="500" y="238" width="400" height="148" class="node node-active"/>
  <text x="700" y="294" text-anchor="middle" class="node-title">ACTIVE</text>
  <text x="700" y="332" text-anchor="middle" class="node-copy">dispatch() runs a specialist</text>
  <text x="700" y="360" text-anchor="middle" class="node-copy">and spends token + tool budget</text>

  <rect x="146" y="238" width="248" height="128" class="node node-green"/>
  <text x="270" y="292" text-anchor="middle" class="node-title">CONFIRMED</text>
  <text x="270" y="326" text-anchor="middle" class="node-copy">report updated</text>

  <rect x="1006" y="238" width="248" height="128" class="node node-green"/>
  <text x="1130" y="292" text-anchor="middle" class="node-title">PIVOTED</text>
  <text x="1130" y="326" text-anchor="middle" class="node-copy">child hypothesis formed</text>

  <rect x="500" y="442" width="400" height="108" class="node node-rust"/>
  <text x="700" y="490" text-anchor="middle" class="node-title">ABANDONED</text>
  <text x="700" y="522" text-anchor="middle" class="node-copy">gap logged or budget exhausted</text>

  <line x1="500" y1="302" x2="394" y2="302" class="arrow"/>
  <text x="420" y="286" class="label">confirm(evidence)</text>

  <line x1="900" y1="302" x2="1006" y2="302" class="arrow"/>
  <text x="908" y="286" class="label">pivot(new statement)</text>

  <line x1="700" y1="386" x2="700" y2="442" class="arrow"/>
  <text x="720" y="424" class="label">abandon(reason)</text>

  <path d="M 604 222 C 560 184, 836 184, 796 222" class="loop"/>
  <text x="700" y="196" text-anchor="middle" class="label">dispatch() keeps the hypothesis active while a specialist runs</text>
</svg>
