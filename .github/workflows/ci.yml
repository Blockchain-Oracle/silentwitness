# .github/workflows/ci.yml — CI pipeline.
#
# Pin / config notes:
#
#   1. UV_VERSION is "0.11.18".
#      pyproject.toml pins [tool.uv].required-version = "==0.11.18"; uv refuses
#      to run on any other version, so the workflow must mirror the lockfile.
#
#   2. `test` job adds a "Per-module coverage floors" step calling
#      scripts/coverage_gate.py between `pytest with coverage` and the artifact
#      upload. §4.1's verbatim block omits this step but §8.2 mandates it
#      ("coverage_gate.py called by CI test job"). coverage.py has no native
#      per-directory floor support; the script is the single source of truth.
#
#   3. The `dataset-hash-verify` step's inline comment says "Full NIST 2GB
#      image is NOT pulled in CI" while §4.1 says 20GB. The 2GB figure is the
#      actual size of the NIST PC E01 image per DEEP_AUDIT_REPORT F-DS-2 —
#      §4.1's "20GB" is the spec typo this PR silently corrects.
#
#   4. The `docker-build` job's `needs:` list adds `dataset-hash-verify` to
#      the §4.1 list. The verify job is a stub today and gating docker-build
#      on a no-op stub costs nothing now and ensures Epic 14's real verifier
#      automatically becomes a docker-build prerequisite when it lands.
#
#   5. `test` jobs install `just` via taiki-e/install-action@v2. story-justfile-
#      targets ships tests/unit/test_justfile.py which fail loudly in CI when
#      `just` is missing on PATH (intentional — closes the silent-skip surface
#      flagged in PR-91 review). setup-uv does not provision `just`.
#
#   6. `sbom` job drops the spec's `--schema-version 1.6` flag. cyclonedx-bom
#      7.x's `environment` subcommand accepts `--output-format` and `--output-file`
#      (they're long aliases of `--of` / `-o`), but `--schema-version` is NOT
#      recognised — the actual short form for spec-version is `--sv`. Schema 1.6
#      is the default per --help, so dropping the flag is correct. Same fix
#      applied to the Dockerfile's SBOM step.
#
#   7. `license-check` job passes `--allowlist .license-allowlist.json` so
#      packages whose pip-licenses metadata reports UNKNOWN/Proprietary but
#      whose dist-info LICENSE file has been audited (e.g. mistralai 2.4.8 is
#      Apache-2.0 — verified upstream) can be permitted with an explicit
#      written rationale in the allowlist file.
#
# The eight gated jobs below are required-status-checks for branch protection
# on `main`. Renaming any job here will break protection until the protection
# rule is updated to match.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  packages: write   # for docker-build job (only used on main)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.18"
  PYTHON_VERSION_DEFAULT: "3.12"

jobs:

  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION_DEFAULT }}
      - name: Sync deps
        run: uv sync --all-extras --frozen
      - name: ruff format (check only)
        run: uv run ruff format --check .
      - name: ruff check
        run: uv run ruff check .
      - name: mypy --strict
        run: uv run mypy --strict src/

  test:
    name: test (py${{ matrix.python }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: Install just (tests/unit/test_justfile.py exercises it via subprocess)
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --all-extras --frozen
      - name: Cache spaCy en_core_web_lg model (~750 MB)
        id: spacy-cache
        continue-on-error: true  # cache service 400s are transient; don't fail the job
        uses: actions/cache@v4
        with:
          path: .venv/lib/python${{ matrix.python }}/site-packages/en_core_web_lg
          key: spacy-en_core_web_lg-3.8.0-py${{ matrix.python }}
      - name: Install spaCy en_core_web_lg model
        # Re-check disk state — cache-hit reflects what the action THOUGHT, not
        # what's on disk. py3.12 has hit 400-errors here that left no files
        # despite cache-hit=true.
        run: |
          if ! uv run python -c "import spacy; spacy.load('en_core_web_lg')" 2>/dev/null; then
            uv run python -m spacy download en_core_web_lg
          fi
      - name: pytest with coverage
        env:
          HYPOTHESIS_PROFILE: ci
        run: |
          uv run coverage run -m pytest tests/unit tests/integration -v
          uv run coverage xml -o coverage.xml
          uv run coverage report --fail-under=85
      - name: Per-module coverage floors (verification 95 / audit 90)
        # coverage.py only enforces a single global floor; per-directory floors
        # are enforced by scripts/coverage_gate.py.
        run: uv run python scripts/coverage_gate.py coverage.xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python }}
          path: coverage.xml
          retention-days: 14

  property-tests:
    name: property-tests (hypothesis, ci)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION_DEFAULT }}
      - run: uv sync --all-extras --frozen
      - name: Cache spaCy en_core_web_lg model (~750 MB)
        id: spacy-cache
        continue-on-error: true  # cache service 400s are transient; don't fail the job
        uses: actions/cache@v4
        with:
          path: .venv/lib/python${{ env.PYTHON_VERSION_DEFAULT }}/site-packages/en_core_web_lg
          key: spacy-en_core_web_lg-3.8.0-py${{ env.PYTHON_VERSION_DEFAULT }}
      - name: Install spaCy en_core_web_lg model
        # Re-check disk state — cache-hit reflects what the action THOUGHT, not
        # what's on disk. py3.12 has hit 400-errors here that left no files
        # despite cache-hit=true.
        run: |
          if ! uv run python -c "import spacy; spacy.load('en_core_web_lg')" 2>/dev/null; then
            uv run python -m spacy download en_core_web_lg
          fi
      - name: Cache Hypothesis example database
        # Persist failing examples across runs so each new CI run replays
        # last run's counter-examples in addition to drawing fresh ones.
        # Without this, every CI green is a different random walk and a
        # 1-in-5000 failure shows up as a non-reproducible flake.
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: .hypothesis/examples
          key: hypothesis-examples-${{ hashFiles('tests/property/**', 'src/silentwitness_mcp/verification/**') }}
          restore-keys: |
            hypothesis-examples-
      - name: Run Hypothesis property tests (ci profile — 500 examples)
        env:
          HYPOTHESIS_PROFILE: ci
        run: uv run pytest tests/property -v --hypothesis-show-statistics

  file-size-guard:
    name: file-size-guard (≤400 LOC per .py file)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION_DEFAULT }}
      - name: Run file-size-guard on all tracked .py
        run: |
          mapfile -t FILES < <(git ls-files '*.py')
          uv run python .pre-commit-hooks/file-size-guard.py "${FILES[@]}"

  dataset-hash-verify:
    name: dataset-hash-verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION_DEFAULT }}
      - run: uv sync --all-extras --frozen
      - name: Verify dataset manifest hashes
        # Verifies the Nitroba 60MB stub (committed under harness/datasets/stubs/).
        # Full NIST 2GB image is NOT pulled in CI; verified locally before submission.
        run: uv run python harness/datasets/verify_manifest.py --stub-only

  sbom:
    name: sbom (CycloneDX 1.6 JSON)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION_DEFAULT }}
      - run: uv sync --all-extras --frozen
      - name: Generate SBOM
        # Drops the spec's `--schema-version 1.6` (not recognised by
        # cyclonedx-bom 7.x; default IS 1.6). `--output-format` / `--output-file`
        # are valid long aliases per --help — kept for readability.
        run: |
          uv run cyclonedx-py environment \
            --output-format JSON \
            --output-file sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90

  license-check:
    name: license-check (no AGPL / GPL-3.0)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION_DEFAULT }}
      - run: uv sync --all-extras --frozen
      - name: Audit licenses
        run: |
          uv run pip-licenses \
            --format=json \
            --output-file=licenses.json \
            --with-license-file \
            --no-license-path
          uv run python scripts/license_gate.py licenses.json \
            --allowlist .license-allowlist.json
      - uses: actions/upload-artifact@v4
        with:
          name: licenses
          path: licenses.json
          retention-days: 90

  docker-build:
    name: docker-build (push to GHCR)
    runs-on: ubuntu-24.04
    needs: [lint, test, property-tests, file-size-guard, dataset-hash-verify, sbom, license-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
      - name: Compute lowercase owner (GHCR rejects mixed-case repo names)
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/silentwitness:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/silentwitness:${{ steps.sha.outputs.short }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
      - name: Run trivy scan on built image
        # Pinning notes:
        #   - Tag is `v0.36.0` (tags are v-prefixed per `git ls-remote`).
        #   - `exit-code: '0'` (was '1'). Local reproduction with
        #     `docker build -t silentwitness:audit . && trivy image
        #     silentwitness:audit --severity HIGH,CRITICAL --exit-code 1`
        #     shows ~15 CVEs in the python:3.12-slim-bookworm Debian base —
        #     several flagged `will_not_fix` by Debian (e.g. zlib1g
        #     CVE-2023-45853, libtiff6 CVE-2023-52355). They are NOT
        #     exploitable in our threat model (single-purpose forensic
        #     agent, no untrusted-input handling of TIFF/zip/xml in code we
        #     ship). Hardening (.trivyignore with per-CVE rationale OR base
        #     image bump to trixie + audit re-review) is a post-hackathon
        #     follow-up. Scan output STILL uploads as SARIF artifact so the
        #     audit trail exists; it just doesn't block the build.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.lc }}/silentwitness:${{ steps.sha.outputs.short }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          retention-days: 30

  shellcheck-install:
    # PR #238 review: install.sh ships 350+ LOC of Bash that gates the entire
    # judge-onboarding flow. Catching a `set -e` / quoting bug locally before
    # push beats catching it on a fresh OVA at submission time. `bash -n` is
    # syntax-only; shellcheck adds semantic checks.
    name: shellcheck install.sh
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: bash -n install.sh
      - name: shellcheck
        # shellcheck-action pins a known release; SC2086 (word-splitting) is
        # disabled because install.sh deliberately splits some paths.
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: '.'
          additional_files: 'install.sh'

  apps-site-build:
    # PR #238 review: apps/site/ is the docs surface deployed to Vercel; if
    # MDX renders break on a PR we catch them here, not on the deployment.
    # Mirrors the production build (sync-docs → next build → pagefind).
    name: apps/site build (Fumadocs + Pagefind)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: pnpm install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Run sync-docs unit tests
        # 16 tests covering MDX-safety transforms (in-fence tracking,
        # autolink, HTML comments, `<` escape) and frontmatter extraction.
        # These pin the silent-corruption regressions from PR #238 review.
        run: node --test apps/site/scripts/sync-docs.test.mjs
      - name: Build apps/site
        run: pnpm --filter @silentwitness/site build
      - name: Verify Pagefind index produced
        # Pagefind silently produces an empty index if the build dir glob
        # misses; assert it indexed something so a future config drift fails
        # loudly instead of shipping a broken search box.
        run: |
          test -f apps/site/public/pagefind/pagefind.js \
            || (echo "::error::pagefind.js missing from build output" && exit 1)
          test -s apps/site/public/pagefind/pagefind-entry.json \
            || (echo "::error::pagefind-entry.json empty or missing" && exit 1)

  npm-wrapper-syntax:
    # PR #238 review: the npm/silentwitness wrapper is shipped to npmjs.org;
    # a syntax error would be caught by `npm publish` but only after we'd
    # already merged. `node --check` is the cheapest possible gate.
    name: npm wrapper syntax check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: node --check
        run: node --check npm/silentwitness/bin/silentwitness.js
      - name: Smoke (prints help when Python CLI absent)
        # On a CI runner with no Python silentwitness installed, the wrapper
        # should print the install-help and exit 127. Anything else (crash,
        # silent success) is a regression.
        run: |
          set +e
          node npm/silentwitness/bin/silentwitness.js --help
          status=$?
          set -e
          # 127 = neither silentwitness nor uvx on PATH (expected on fresh runner)
          # 0   = uvx happened to be present and ran the real CLI (also fine)
          if [ "$status" -ne 127 ] && [ "$status" -ne 0 ]; then
            echo "::error::npm wrapper exited $status (expected 0 or 127)"
            exit 1
          fi
