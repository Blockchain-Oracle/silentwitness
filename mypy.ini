[mypy]
python_version = 3.12
strict = True
warn_unused_configs = True
warn_redundant_casts = True
warn_return_any = True
warn_unreachable = True
disallow_untyped_decorators = True
no_implicit_reexport = True
show_error_codes = True
exclude = (?x)(
        ^build/
      | ^dist/
      | ^\.venv/
      | ^harness/datasets/
      | ^harness/case-trapdoor/output/
    )

# tests/ are excluded from src-strict but still type-checked separately if needed.
[mypy-tests.*]
disallow_untyped_decorators = False
disallow_untyped_defs = False

# spacy ships no type stubs — silence missing-import noise.
[mypy-spacy.*]
ignore_missing_imports = True

# WeasyPrint stubs are partial.
[mypy-weasyprint.*]
ignore_missing_imports = True

# pydantic-ai stubs are first-party but still evolving; allow soft fallback.
[mypy-pydantic_ai.*]
ignore_missing_imports = True

# mcp Python SDK ships partial typing.
[mypy-mcp.*]
ignore_missing_imports = True

# volatility3 has no published stubs.
[mypy-volatility3.*]
ignore_missing_imports = True
