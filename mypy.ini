[mypy]
python_version = 3.12
strict = True
warn_unused_configs = True
warn_redundant_casts = True
warn_return_any = True
warn_unreachable = True
disallow_untyped_decorators = True
no_implicit_reexport = True
show_error_codes = True
exclude = (?x)(
        ^build/
      | ^dist/
      | ^\.venv/
      | ^harness/datasets/
      | ^harness/case-trapdoor/output/
    )

# tests/: relax the two flags that conflict with pytest fixture style (untyped
# decorators + untyped defs). Every other strict flag still applies — tests are
# NOT exempt from strict mode, only from those two specific lints.
[mypy-tests.*]
disallow_untyped_decorators = False
disallow_untyped_defs = False

# Per-library overrides for imports that arrive in later epics:
#   - mcp           → Epic 2 (MCP server skeleton)
#   - spacy         → Epic 3 (entity gate / NER)
#   - pydantic_ai   → Epic 8/9 (investigator + specialists)
#   - volatility3   → Epic 5 (memory tools — also runs in its own venv)
#   - weasyprint    → Epic 11 (report PDF rendering)
# Each lacks complete first-party stubs as of the locked pins in architecture.md
# §1. The sections look dormant on ``mypy --strict src/`` today because no
# product code exists yet; they take effect as src/ grows.

[mypy-spacy.*]
ignore_missing_imports = True

[mypy-weasyprint.*]
ignore_missing_imports = True

[mypy-pydantic_ai.*]
ignore_missing_imports = True

[mypy-mcp.*]
ignore_missing_imports = True

[mypy-volatility3.*]
ignore_missing_imports = True

[mypy-dfvfs.*]
ignore_missing_imports = True

[mypy-Evtx.*]
ignore_missing_imports = True

[mypy-evtx]
ignore_missing_imports = True

[mypy-mft]
ignore_missing_imports = True

[mypy-defusedxml.*]
ignore_missing_imports = True

[mypy-regipy.*]
ignore_missing_imports = True

[mypy-pyesedb]
ignore_missing_imports = True

[mypy-yaml]
ignore_missing_imports = True
